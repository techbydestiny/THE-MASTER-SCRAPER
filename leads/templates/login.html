{% extends 'base.html' %}
{% block content %}

<section class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-16 relative overflow-hidden">

  <!-- Background decoration -->
  <div class="absolute inset-0 bg-gradient-to-br from-brand-50 via-white to-blue-50 pointer-events-none"></div>
  <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[400px]
              rounded-full bg-brand-500/10 blur-[100px] pointer-events-none"></div>
  <div class="absolute bottom-10 right-10 w-48 h-48 rounded-full bg-blue-400/10 blur-3xl pointer-events-none"></div>

  <div class="relative w-full max-w-md animate-fade-down">

    <!-- Logo mark -->
    <div class="text-center mb-8">
      <a href="{% url 'homepage' %}" class="inline-flex flex-col items-center gap-2 group">
        <span class="w-14 h-14 bg-brand-500 rounded-2xl flex items-center justify-center text-2xl
                     shadow-lg shadow-brand-500/30 group-hover:scale-105 transition-transform duration-200">
          🔍
        </span>
        <span class="font-display font-bold text-xl text-ink">MasterScraper</span>
      </a>
      <p class="text-gray-400 text-sm mt-2">Sign in to your account</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-xl shadow-gray-200/80 border border-gray-100 p-8">

      <h2 class="font-display font-bold text-2xl text-ink mb-6">Welcome back</h2>

      <form method="post" class="space-y-5">
        {% csrf_token %}

        <!-- Username -->
        <div class="space-y-1.5">
          <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-3.5 flex items-center text-gray-400 pointer-events-none">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
              </svg>
            </span>
            <input type="text"
                   id="username"
                   name="username"
                   required
                   placeholder="your_username"
                   class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 bg-gray-50
                          text-sm text-ink placeholder-gray-300
                          focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500
                          hover:border-gray-300 transition-all duration-150">
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-1.5">
          <div class="flex items-center justify-between">
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
            <a href="#" class="text-xs text-brand-500 hover:text-brand-600 font-medium transition-colors">
              Forgot password?
            </a>
          </div>
          <div class="relative">
            <span class="absolute inset-y-0 left-3.5 flex items-center text-gray-400 pointer-events-none">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
              </svg>
            </span>
            <input type="password"
                   id="password"
                   name="password"
                   required
                   placeholder="••••••••"
                   class="w-full pl-10 pr-10 py-3 rounded-xl border border-gray-200 bg-gray-50
                          text-sm text-ink placeholder-gray-300
                          focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500
                          hover:border-gray-300 transition-all duration-150">

            <!-- Toggle visibility -->
            <button type="button" id="toggle-pw"
                    class="absolute inset-y-0 right-3.5 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
              <svg id="eye-open" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              <svg id="eye-closed" class="w-4 h-4 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit"
                class="w-full py-3.5 rounded-xl font-display font-semibold text-sm text-white
                       bg-brand-500 hover:bg-brand-600
                       shadow-lg shadow-brand-500/25 hover:shadow-brand-600/30
                       transition-all duration-200 hover:-translate-y-0.5 active:translate-y-0
                       focus:outline-none focus:ring-2 focus:ring-brand-500/40">
          Sign in →
        </button>
      </form>
    </div>

    <!-- Footer note -->
    <p class="text-center text-xs text-gray-400 mt-6">
      Protected by secure session authentication.
    </p>
  </div>
</section>

<script>
  const toggle = document.getElementById('toggle-pw');
  const pwInput = document.getElementById('password');
  const eyeOpen = document.getElementById('eye-open');
  const eyeClosed = document.getElementById('eye-closed');

  toggle.addEventListener('click', () => {
    const isPassword = pwInput.type === 'password';
    pwInput.type = isPassword ? 'text' : 'password';
    eyeOpen.classList.toggle('hidden', isPassword);
    eyeClosed.classList.toggle('hidden', !isPassword);
  });
</script>

{% endblock %}
